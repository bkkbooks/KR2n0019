body:
  text: 絳帖平卷六宋姜夔撰山晉王羲之書山谷云右軍筆法如孟子言性莊周談自然從説横説無不如意非復可以常理待之又云王氏書法以為如錐畫沙如印印泥葢言鋒蔵筆中意在筆前耳承學之人更用蘭亭永字以開字中眼目能使學家多拘忌成一種俗氣要之右軍二言羣言之長也得袁二謝書具為慰袁生暫至都已還未此生至到之懐吾所也袁謂袁宏二謝謂安萬袁宏嘗從桓温北伐謝安亦嘗為温司馬右軍當是得袁謝爾時書所也之間當别有一字袁或是陳郡袁嶠之與右軍謝萬同燕曲水不得臨川問懸心不可言子嵩之子來數有使兾囙得問示之法書要錄十卷載右軍帖語云僕有至臨川意葢右軍嘗為臨川也庾敳字子嵩與王夷甫同遇害黄云子嵩與右軍不同時然此言其子耳勞心賢妹大都轉差然想小大皆佳知賔猶爾耿耿想得夏節佳也念君賔當是蔡謨家兒報字卷云蔡家賔至法書要錄卷載右軍帖語云小大佳否賔轉勝又云得官奴書賔平安皆若人也又不能不痛熈荐亡政爾復何于求人度政當求之内事餘理不絶求之一條當有兾不信冈然前塗願具誨之以悟其心郗曇字重熈右軍婦弟為北中郎將戰敗左官而亡亡在升平五年正月右軍亦以是年亡見真誥但未知孰先後耳或是右軍在後作此帖也荐亡者謂曇代荀羡為北中郎二人相繼早世也陳簡亝甚疑此字大意逸少因羡熙之亡感人生之短景貽書髙士講求性命之理故曰求之内事當有兾不又云前塗願具誨之以悟其心似亦謂此按許詢郗愔與右軍皆從仙人許邁逰此帖當是與邁輩而傳臨之餘字殊惡矣行成旅以從是月也景風司至星火列宵伯趙鳴而載隂爽鳩習而揚武時可以升髙望逺亦可以出宿餞行有詔具寮爰開祖此帖六行山谷云恐是虞褚輩早年書實不爾黄云先輩以為張説送賈至文非也乃賈曾送張赴朔方序中云備官而行成旅以従下云有詔具寮爰開祖宴且申後命寵以蕃錫此帖自行字上祖字下皆亡而作艸書皆不綴屬當是集逸少書冩此序耳米亦云自是月以下偽殊不知行成以下已偽矣予按此帖墨跡尚在秘省乃流俗書非集右軍字兄闕柩垂至永惟崩慕痛貫心膂痛當奈何計闕黄云此帖偽非也但嘗經俗筆臨耳褚氏書目有兄安厝情事長畢帖右軍不聞有兄乃羣從耳羲之頓首闊别相久眷與時長寒嚴足下何如想清豫耳披懐之樂復何致樂諸賢從就理當不踈吾之朽疾日就羸頓加復風勞諸無意賴促膝未近東望慨然所兾日月易得還期非逺耳深敬宜音問在數遇信忩遽万不一陳山谷云此好事者戲為之耳書未為甚惡而以亂逸少則不可如云吾之朽疾行就羸頓皆懐素髙閑輩鄙語日月如馳嫂棄背再周去月穆松大祥奉瞻廊然永惟悲摧情如切割汝亦增慕省疎酸感此帖似是右軍語法書要錄中亦載此數語但多不同耳穆松似是王氏兒又一帖誤在鍾繇後云松等愪慟亦此人也建安闕柩至慈䕃幽絶垂三十年永惟慕痛徹五内永酷奈何無由言苦臨帋摧哽羲之報此帖墨跡在王順伯家傳寶有緒右軍帖傳至今者秘閣尚有二十許軸多唐人鉤臨聞此妙跡恨未得見嘗有墨本頗勝官帖也帖語亦見法書要錄此諸賢粗可時見省甚為蕳闊逺湏異多少患而吾疾篤不得數為歎耳知足下散勢小差此慰無以為喻云氣力故爾復以悒怛想散患得差餘當以漸消息耳吾頃無一日佳衰老之弊日至夏不得有所噉而猶有勞務甚劣甚劣散者何晏所服寒食散觧見大令帖近因鄉里人書想至知故靣腫耿耿今差不吾比日食意如差而髀中故不差以此為至患至不可勞力數字今弟知問耳右三帖書有頓挫鋒勢雄勁真右軍名跡適重熈言如此果爾乃甚可憂張平不立勢向河南者不知諸侯何以當之熈表故未出不説荀侯疾患想當轉佳耳若熈得勉此一投當可言淺見實不見今時兵任可䖏理郗曇字重熈右軍婦弟按史殷浩北伐以荀羡為北中郎將而羡有疾朝廷以曇為羡軍司加散騎常侍頃之羡徵還仍除曇為北中郎將此帖熙表故未出否荀侯疾患想當轉佳若熈自勉等語知是彼時作葢羡北伐時年二十八殷浩以羡在事有能名故居以重任右軍所以憂也是時并州郟史張平為苻堅所逼奔平陽穆帝升平二年六月也曇為北中郎將在八月此帖右軍暮年筆小佳更致問一一適修載書平安修載王耆之字郎邪人􅘙之弟慈顔幽翳垂三十年而吾匆匆不知堪臨始終不發言哽絶當復奈何吾頃至匆匆比加下此帖字畫未為佳然語見法書要錄當是臨失昨見君歡復無喻然未善悉想宿昔可耳脅中云何一言消息值周轉勝也耿耿黄云似是集成字意皆不相屬非也此乃一筆皆成初書數字筆鋒含墨後乃筆鋭耳值或作徳皆未詳疾患小差云𢎞逺俱次遲共寫懐王羲之此帖非偽遲共寫懐共或作無作與皆非此共字昭然特模多苐二筆耳𢎞逺是二人名俱次次舍也諸家觧作論詣皆非後卷期已至帖次道字亦如此承足下還來已久别欲參慰為染患不能得往問眷仰情深豈此委具已兩日少可尋兾言展若因行李願存故舊今遇賢弟還得數張紙勞動幸不怪耳謹此代申不具釋智永右帖末作釋智永不待能者皆知其非右軍書劉云太宗皇帝豈不曉此釋智永字特取其筆法類右軍耳山谷云是永師書之不臧者以予觀之不類右軍智永亦不肯作此鄙語惡書也此墨跡在秘閣又與一帖同卷題云右軍書末有𢎞白二字甚昭然可笑然劉無言亦嘗編入秘閣續帖以為王右軍書也殆不可暁雪候既不已寒甚盛冬至可苦患足下亦當不堪之轉復知問王羲之知逺以當造次遲見此子真以日為嵗足下得審問㫖令君右二帖是右軍書之平平者荀侯佳否來果就卿許企懐耳安西音信明云遇得洛也計解有懸休尋荀侯似謂荀羡安西音信或作安好非安西謂庾亮耳西字狡獪非書之正遇得歸洛似言殷浩入洛也然書體不古恐唐人信手所歸就卿許猶世説王大將軍許知君當有分佳者念處窮毒而復分乖當可居情想反理斷當三反想至所苦晚差不耿耿僕脚中不堪沈隂重痛不可言不知何以治之憂深力不具王羲之頓首右二帖皆右軍書反理斷當以理反觀而斷當也深以自慰理有大斷其思豁之令盡足下勿乃憂之足下殊當憂吾故具示得吾故具示得具字得字訛不可讀僕近修小園子殊佳致果雜藥深可致懐也儻因行往希見比二處動靜故常患馳情散騎癰轉利慶至姊故諸惡反側永嘉至奉集欣喜無喻餘可耳得華直疏故爾諸惡不差懸憂順何似未復慶等近消息懸心君並何為耶此猶未得盡集理行大尅遲此無喻右一帖米以為子敬書黄謂動靜以下方是子敬然予觀此自是兩帖前一帖乃唐人書所謂近修小園子儻因行往皆唐語也觀其筆勢乃與安西音問同一手所為耳後一帖乃是子敬書散騎王珣也慶與華直王氏内外子孫敬帖中皆有永嘉謝鐵也治頭眩腦悶或患癰腫頭不即潰者以此藥貼之皆良蜱麻巴豆薰陸石塩芎藭松脂六物粗搗如米粒許其巴豆三分减一松脂少加其分頭悶處先剃去髪方寸以帛帖塗藥當病上帖之周時帖刮上爛皮以生麻油和石塩塗上當有黄水出為佳羲之上官帖無頭悶帖惟絳帖有之黄云政和丁酉六月七日丹陽陳君孝友見過云崇寜間彭諌議君時守潯陽役兵於山間斸石得一大石中空内有小石即此碑也大石未破時堅完無際不解何縁中有此帖殊可異也陳之父時亦官潯陽得此拓本因以見遺視之比絳帖尤縱逸結字互有工拙要之此本當在絳刻前但不知何世所刻案逸少嘗在江州豈晉以後好事者因移寫於石與意其薶沒既久土變為石故是刻蔵於石間理不足怪世或以此帖為虞永興書恐未必然或虞嘗臨此書微翻其體予案秘閣續帖有永興齋㑹帖如出一手又其中煩腦字與此惱字相似知是虞臨可信又案晉武帝太康十年置江州所統荆揚地十郡初理豫章至成帝咸康六年移於潯陽逸少嘗在江州葢是庾亮死後咸康之末即潯陽也詳見郗超帖宋書作咸康六年移治潯陽續通典作咸和元年絳帖平卷六

body:
  text: 絳帖平卷五宋姜夔撰徳絳帖中此一卷皆晉代名賢之妙蹟惟王廙二十四日帖謝安後一帖是贗餘皆可以為師法晉中書令王洽書洽白辱告承問洽故爾劣劣兾以復叙還白不具王洽再拜洽頓首言不孝禍深備嬰荼毒䕃恃亡兄仁愛之訓兾終百年永有憑奉何圖慈兄一旦背棄悲號哀摧肝心如抽痛毒煩寃不自堪忍酷當奈何痛當奈何重告惻至感増斷絶執筆哽㖒不知所言洽頓首言洽頓首言兄子號毁不可忍視撫之摧心發言哽慟當復奈何奈何洽頓首拜洽白尚感塞不成叙得告承問殊乏劣白不具王洽再拜王領軍敬和丞相第三子右軍之従兄也王僧䖍評書云領軍謂右軍曰弟書遂不减吾變古制今惟右軍領軍不爾至今猶法鍾張今觀此帖清逸閑雅真不在右軍下也晉司徒王珉書珉頓首頓首此年垂竟悲懐兼割不自勝奈何奈何寒切體中比何似甚耿耿僕疾遂不差眠食少憂深遣書不次王珉頓首頓首十八日珉白此二書蹔至未更近問懸情不適比可不吾羸疾故爾憂深力書不具王珉敬問何如僕故頓弊力書不次王珉頓首頓首上下何如僕上下上下大都蒙㤙得書至之吾具今欲出耳吾此月亟遣廿四是王濟祖日欲必赴卿可尅過明吾當下解相待飡出亦遣報既至三家畢卿可豫擬光公令作一頓美食可投其飯也王珉前報王小令珉洽之子善行書子敬云弟書如騎騾駸駸欲度驊騮前代子敬為中書故世謂子敬為大令珉為小令卒贈太常不為司徒也書視敬和為小劣與元琳王珣當雁行第四帖尤竒王濟當是人名祖日者祖餞之日尅過此也與逸少帖安石昨必欲尅潘家尅二十五日同陳子昻表云除此之際未有尅期至今隂陽家謂之尅擇黄云小令此年帖本唐人所畜與二種虞松三帖為一卷珉帖末云輔國司馬君筆勢婉雅與此間矣此亦無後五字晉司徒王珣書三月四日珣頓首末終衆感得七月書知問寒何如就弊憂之劣不具王珣頓首白元琳季琰之兄誤列在後帖中如此多矣山谷云衆感字皆佳晉侍中王廙書二十四日廙白唯久白想適妙來行未面遲想得示知同云兾何生相見近及不多王廙白臣廙言臣祥除以復五日窮思永逺肝心寸截甘雪應時嚴寒奉被手詔伏承聖體御膳勝常以慰下情臣故患匈滿氣上頓乏匆匆慈㤙垂愍每見慰問感戴屏營不勝銜遇謹表陳聞臣廙誠惶頓首頓首死罪死罪臣廙言昨表不宣奉賜手詔伏承聖體勝常以慰下情不審夙昔復何如承鄭夫人乃尔委頓今復増損伏唯哀士愍存益勞聖心謹附承動靜臣廙言七月十三日告藉之等近日遣王秘書不言月行復半念汝獨思不可堪居奈何奈何雨凉不差嫂何知汝所患遂差未懸心不可言阿母蒙㤙上下悉佳宜可行瘧如復斷要取未㫁愁人宜復具日發與别􅀈􅀈不可言今遣使未北反書不具白復㑹日消息廙疏王世將従王敦之命為平南將軍故晉人多稱為王平南没贈侍中為明帝師書為右軍法過江右軍前平南為最今觀後二表真有鍾元常之風祥除表世别有全本後云具官臣王廙上此欠一行七月第二帖筆意清逺天下之佳書黄云世將信能鍾氏筆意山谷云王得中學鍾絶近真行皆好如此書乃可臨學雨凉不下一字不曉諸家作悉後有悉佳字不爾晉太宰髙平郗鑒書鑒頓首頓首災禍無常奄承遘難念孝性攀慕兼剥不可堪勝奈何奈何望逺未縁叙苦以増酸楚鑒頓首頓首老郗雖非贗校官帖為無韵竇􅡄云博哉四庾茂矣六郗今存其三攀字下省一筆極佳晉侍中郗愔書九月七日愔報比得章知弟漸佳至慶想今漸勝食進不新羗難將適猶懸憂遣不具愔報比書想悉逹日凉弟佳不及數字愔報逺近何地王右軍竟去不付石首干一節想親親今悉如常敬豫何當來即道祖故本善差恒在尚書不見來多日山谷云郗方回書初不减王氏父子方囬右軍婦弟書固當佳第二帖似缺文石首干即乾也古謂干乾二字通用敬豫王恬字丞相子道祖未詳晉中書郎郗超書超言逺近無他説苟異問者定虚耳云叚龕歸順不知審不王江州為宗正似已定前所傳者虚妄耳異同自㫖啓超言按晉地理志石季龍末遼西叚龕自號齊王據青州永和七年龕以青州來降以龕為鎮北將軍封齊王今此帖中言叚龕歸順以此又按史亮庾亡後逸少為江州王充之繼之此咸寧建元之間去龕歸順尚十餘年不知何為爾也書亦不工晉尚書令衛瓘書頓州民衛瓘惶恐死罪中闕音敬望想盡懐在外累年始爾得還情甚踴躍旦至三十里上湏節度明日乃入奉説欣承福祚日白不具瓘惶恐死罪死罪頓州民衛瓘頓字下當有一首字古無頓州瓘河東安邑人若以為頓丘又在衛地了不相干也瓘與索靖俱善草𨽻號一臺二妙雖嘗為尚書令終於太保山谷云衛中令音敬帖近世草書不復敢望其籓此一章語亦佳晉黄門郎衛恒書一日有恨知問未面為嘆欲七日云邪恒白恒即瓘子其論四體書極有源流非後世所及也王簡穆云二衛書無以評其優劣但見其筆力驚異耳此帖皆似失真亦見上字卷晉太傅陳郡謝安書安頓首頓首每念君一旦知窮煩寃號慕觸事崩踴尋繹荼毒豈可為心奈何奈何臨書悽悶安頓首頓首六月廿日具記道民安惶恐言此月向終惟祥變在近號慕崩慟煩寃深酷不可居處比奉十七十八日二告承故不和甚馳灼大熱尊體復何如謹白記不具謝安惶恐再拜安石書不在大令下故不甚重大令書也六月廿日帖米云贗誠然黄以為傳摹失真過矣山谷云道民安葢事五斗米道者右軍為獻之女玉潤請罪亦稱民也又云謝太傅墨跡聞駙馬都尉李公照有之不作姿媚態度恨不見爾但如此去右軍父子間可着數人晉散騎常侍謝萬書七月十日萬告朗等便流大感傷兼切不自勝奈何奈何轉凉汝等各可之知近聞邑邑吾涉道動下疹之勞劣力及不具告父疏萬石人品在安石下當時有攀安提萬之語書亦然然搃謂之二謝朗萬兄之子而自稱父告亦猶踈受謂疎廣叩頭從大人議葢古人之諸父猶父也聞與問同絳帖平卷五

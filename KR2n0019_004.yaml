body:
  text: 絳帖平卷四宋姜夔撰天晉侍中卞壼書足下佳不朝北中郎上獲諸誠文墨至便在舍事許改愛子紙下物知此草忽令一人見也吾令敕書事令不發亟付卿發便密令人房之卞壼白壺誤題作壺發便密令人房之房防古通用晉謝發書晉安素自强壯且年時尚可當延遐期豈謂奄至於此自畢逺近二三惋愕不能已己未欲㫖問悲酸悒悒想不久可得還耳執筆惻感晉安如陶詩殷晉安之類以上二帖語雖古而書非晉置晉安郡今福州梁簡文所封宋特進王曇書昨復散差可然不過佳諸示所宜如更增劇恐難為力耳未能令遣俗有餘念故耳王曇首和王曇書名昭然有一首字而王著違之劉亦不覺其非釋為答也曇首事宋文帝以太子詹事侍中卒年三十七當時稱王詹事未嘗為特進也宋中散大夫羊欣書三月六日欣頓首暮春感摧切割不能自勝當奈何奈何得去六日告深慰足下復何如腳中日勝也吾日弊難復令自顧憂歎情想轉積執筆憎惋足下保愛書欲何言羊欣頓首羊敬元年十二時王子敬甚知愛之夏日著新綃裙晝寢子敬見之書裙數幅而去欣書本工因此彌善王僧䖍評書云欣書見重一時親受子敬行書尤善正乃不稱名袁昻評書云欣書似婢作夫人舉止羞澀終不似真乃謂不盡力於正書也而史稱其善𨽻書何耶欣自有筆精帖傳于世此帖僞作謝發云執筆惻感此云執筆憎惋字雖大小真行不同觀其筆勢乃一人所作耳宋太常卿孔琳書日月深酷撫膺崩􅀈心肝分膾尋繹懊憹觸感隕絶孤思悒悒自郡地窮當奈何不孝奈何念痛悼難勝得去月二示知君所患故爾不差甚有幽悒熱甚比復何似想已轉佳眠食極勝也善將治之孤子並疾患歎具恨恨腳中轉劇近服散未覺益惙頓何賴扶力迷甚不次孤子孔琳奈何頓首孔琳之字彥林題缺之字㑹稽人宋太常善草𨽻此帖縱逸亦可喜竇臮述書賦亦稱其緊速也大抵右軍以前書法真自真行自行章自章草自草王子敬年十五六時啓其父乃於行草之間别創新體故當時傾慕羊薄謝孔之徒一時爭效而正行之體壞矣蓋行草為書不惟便於揮運而不工於字但能行筆者便可為之知古之士不貴也自唐及今書札之壞實由於此蓋縱逸甚易收斂甚難人心易流冝其書之不古甚者反以學古為拘良可歎也今欲觀古人正行蘭亭叙玉潤帖之類是已學者當知之黃云此帖恨恨等十二字偏小蓋行間側坐摹帖者妄以入行耳當依本為勝豫按王僧䖍伎録載漢魏樂府歌辭皆有側注也自地之間字不可曉諸家作郡未是示君閒作知字雖失猶有君歎具或作歎歎迷下一字不可曉恐是書字缺一筆服散黃作明散恐是摹失齊侍中王僧䖍書臣僧䖍啓南臺御史謝憲乃堪驅使臣門義舊粗是所悉統內新故雜米數十萬斛實須督切憲今請假在此臣欲折以統相攝庶得速辨其頻經督運已有前效謹以啓聞伏願聽許謹啓王簡穆郎邪人書名齊代此帖雖佳亦應失真簡穆自謂正書第一今觀其位置未為盡善蓋自子敬以後楷法不古宋齊人喜效子敬行草故於正書不甚用工也然簡穆特善評書言必稽古未嘗以已意定髙下又與齊帝較書之優劣其言不讓亦猶子敬自稱過父當時人自重書名如此隨僧智果書梁武帝評書從漢末至梁有三十四人王僧䖍書如揚州王謝家子弟縱復不端正奕奕皆有一種風氣王子敬書如河朔少年皆充悅舉體㳫拖而不可耐羊欣書似婢作夫人不堪位置而舉止羞澀終不以真阮研書如貴胄失品次不復排哭英賢王儀同書如晉安帝非不處尊位而都無神明殷均書如髙麗人抗浪乃不有意氣而姿顔自足精味徐淮南書如南岡士大夫徒尚風軌然不寒乞陶隱居書如吳興小兒未成長而骨體甚峭快吳拖書如新亭傖父一往似揚州人共語語便態出栁産書如深山道士見人便欲退縮曹喜書如經綸遣士言不可絶王右軍書字勢雄强如龍跳天門虎卧鳯閣故歷代寶之永以為訓蔡雍書骨氣洞逹爽爽如有神力程曠平書如鴻鵠弄翅頡頏布置初雲之見白日蕭思話書如舞女低腰仙人嘯樹李鎮東書如芙蓉之出水文彩如鏤金桓𤣥書如快馬入陳隨人屈曲豈須文譜范懷約真書有分草書無功故知簡牘非易皇象書如韻音繞梁孤飛獨舞孔琳之書如散花空中流徽自得李巗之書如鏤金素月屈玉自照薄紹之書如龍逰在霄繾綣可愛秦獄吏程邈善大篆得罪始皇雲陽獄增减篆體志其名名其書曰𨽻也扶風曹喜後漢人不知其官善篆及𨽻篆等少異李斯見重一時耶鍾司徒書字有十二種意外巧妙絶倫多竒崔子玉書如危􅀢阻日孤松單枝邯鄲淳書應規入矩方圓乃成師宜官書如鵬翔未息翩翩而自逝梁鵠書如龍威虎震劔拔弩張張伯英書如武帝愛道憑虛欲仙衛恆書如插花舞女援鏡笑春索靖書如飄風忽舉鷙鳥乍飛鍾繇書如雲鶴逰天羣鴻戲海行間茂密實亦難過耶按梁武論鍾繇書有十二意均間平直踈密損益之類至唐人傳其法解釋尤詳此云鍾司徒書有十二種意外巧妙絶倫多竒未知是前十二意不然則傳流之差以元常為司徒或司徒又自有十二種意外巧妙過其父邪書評乃梁武命袁昻作非武帝評也事見法書要録據此帖止有三十人而兩曹喜法書要録云袁嵩書如深山道士見人便欲退縮蕭子雲書如經綸道人言不可絶以此帖智果誤以袁嵩為栁産子雲為曹喜也然兩書所載人名數各不同王僧䖍王子敬羊欣阮研王儀同殷均徐淮南陶隱居吳拖柳産曹喜王右軍蔡雍程曠平蕭思話李鎮東桓𤣥范懷約皇象孔琳之李嚴之薄紹之程邈扶風曹喜鍾司徒崔子玉邯鄲淳師宜官梁鵠張伯英衛恆索靖鍾繇右三十三人官帖王僧䖍王子敬羊欣阮研王儀同殷均徐淮南陶隱居吳拖袁嵩蕭子雲崔子玉師宜官韋誕蔡雍皇象張伯英索靖梁鵠鍾司徒衛恆孟光録李斯鍾繇逸少蕭思話薄紹之右二十七人法書要録其他尚多抵牾世無善本可校按智果智永同是辨才弟子果得右軍骨永得右軍肉皆以能書名永書固為妙絶果書如此未為髙古也黃云此字局闕天然少疑非智果案梁武帝藏鍾張二王書至多嘗使虞和陶隱居輩訂證不獨袁昻也隋朝法帖皇帝敬問婺州雙林寺慧則法師朕尊崇聖教重興三寶欲使一切生靈咸蒙福力法師捨離塵俗投志法門専心講誦宣揚妙典精誠如此深副朕懷既利益羣生當不辭勞也猶寒道體如宜令遣使人指宣往意隋朝帖當是吏筆簿有吏氣豫嘗見唐吏筆亦如此宋儋書自一接拜情同弟兄沈吟緬懷固非小子之所勤及也榮質前謝恐乖昔賢共弊之道晦事勿語且絶詩人匪報之實遲回循軀偭俯未已殆將有辰矣足下多可不怪髙情內含如筠斯清比蕙又暢儋不以感氣厚而修詐自廣不以撫已多而私頌作德未致力謝馳懷宣書何陳萬一也悚息今秋盡野外草木變衰長郊蕭條風物凄緊清都久客莫復相親足下退食公庭􅀈罷私室櫛沐晞景收視解聽足念嵗華不待厭倦為旅之士哉頃者釀王初令絃絲正調竟欲左攜鄭君幽指藥妙右對董叟髙談道微情酣世忘浩𤣥塵粃思足下能順試實其事為如何哉時聞真聲迥聞笙鶴此復異于人境耳或以息宴可以嘯歌久不閒然期今日之事也倚候騎氣自豫光臨幸甚謹馳疏不得一一宋儋白案竇臮述書賦云宋儋李璆擅美中州李師王而意淺宋效鍾而體疏注云儋字藏諸廣平人髙尚不仕書作鍾體而側戾放縱黃氏深不取其書以為但作側戾殊失天勢東坡山谷殊不喜其文乃云其人不解此狡獪書便不足觀前輩之去取不同如此然而譬之查梨橘柚終不可棄也絳帖平卷四

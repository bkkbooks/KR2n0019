  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0019_WYG_002-1a, image: WYG0682/WYG0682-0009c.png}
body:
  text: 絳帖平卷二宋姜夔撰月漢張芝書知汝殊愁且得還為佳也冠軍暫暢釋當不得極蹤可恨吾病來不辨行動潜不可耳終年纒此當復何理耶且方有諸分張不知以去復得一㑹不講忘不忘可恨汝還當思更就理一昨逰悉誰同故數往虎丘不此甚蕭索祖希時面因行藥欲數處看過還復共集散耳不見奴粗悉書云見左軍彌數語聽故也今欲歸復何時報之追不具㧾散佳並侍郎耶言别事有及過謝憂勤二月八日復得鄱陽等多時不耳為慰如何平安等人當與行不足不過彼與消息八月九日芝白府君足下不日秋凉平善廣間彌邁想思無違前比得書不遂西行望逺懸想何日不勤捐業漂泊不當行李又去春送舉喪到美陽須待伴比故遂簡絶有緣復相聞餐食自愛張芝幸甚幸甚太平興國中詔天下搜訪前哲墨跡圖書先是荆湖轉運使得張芝草韓幹馬以獻此帖是也按芝字伯英𢎞農人凡家之衣帛必書而後練之臨池學書池水盡黑下筆必為楷則號忩二不暇草書寸紙不見遺韋仲將謂之草聖此五帖僅一真不知以去以與已同蘭亭以為陳迹或作比非講志或釋作竟非也竟字當于德字卷郗愔帖看之米云五帖皆非長史書黃云張祖希𤣥之字與大令同時當是時史書黃云帖辭耳豫按續晉陽秋張𤣥之嘗為冠軍將軍又按世說王東亭珣與張冠軍善既作吳郡人問小令王珉曰東亭作郡風政何似答曰不知治化如何惟與張祖希情好日隆前兩帖所謂冠軍暫暢適祖希時面數往虎丘等語似是珣作吳郡時帖以為伯英過矣顔魯公虎丘寺詩云捨宅仰珣珉則知珣又嘗居吳也後兩帖云侍郎者郗愔也鄱陽者王􅘙也當是右軍父子帖以上四帖皆經長史或藏真手臨藏鋒圓徑如篆筆所謂錐畫沙者也長史嘗以此法授顔平原平原授藏真柳公權楊凝式皆得之近時惟思陵獨擅其妙第五帖章草髙古可愛真伯英之妙跡不日秋凉諸家皆不曉不日二字伯英既是𢎞農人則送喪至美陽應亦有之美陽岐山也山谷云此書絶妙無品者信然淳化官帖十卷除二王書多佳者外唯有張芝小草皇象前帖鍾繇宣示帖王􅘙二表而已苟伏膺於此四家亦足以誇唐人矣後漢書子玉書賢女委頓積日治此為憂懸燋心今已極佳足下勿復憂念有信來數附書知聞以解其憂崔瑗字子玉後漢安平人善小篆草師杜度衛恆云章帝時杜度善作篇後有崔瑗崔實亦皆稱工杜氏闕字甚安而書體微瘦崔氏甚得筆勢而結體小疏此帖附書知聞是唐人語筆亦不古子玉書有張平子碑傳于代吳皇象當在鍾後文武將墜乃俾俊臣整我皇綱董此不䖍古君子即戎從身闕昭其果毅尚其桓桓師承七十氣冠三軍詩人作歌如鷹如鸇天有泰一五將三門地臣象言頑暗容薄加以年老凡百乖穢無所聞宜特䝉哀傷殊異之遇安感騎乘之權逰息之燕淳和足使忘軀命榮觀足以光心膂延望翹翹念在效報而趨走垂須終何才力以答新恩惟尚有借近趙走交過首貧尚尋天恩智方當私成無任顔愛自彌又唯皇象吳人字休明前一帖乃寫後漢東觀校書郎髙彪送幽州督軍第五永針其文曰文武將墜乃俾俊臣整我皇綱董此不䖍古之君子即戎忠身明其果毅尚其桓桓吕尚七十氣冠三軍詩人作歌如鷹如鸇天有泰一五將三門地有九變丘陵山川人有計策六竒五間云云蔡雍等甚美其文以為莫尚也此以明為始以吕為師蓋范曄作史因晉代舊書避晉諱耳當以此為正缺一之字忘誤作或是傳訛然書跡妙絶遂為章草之冠魏鍾繇書尚書宣示孫權所求詔令所報所以博示逮於卿佐必兼良力出於阿是芻蕘之言可擇廊廟況繇始以疏賤得為前恩橫所眄睨公私見異愛同骨肉殊遇厚寵以至今日再世策名同國休戚敢不自量切致愚慮仍自逹晨坐以待旦退思鄙淺聖意所棄則又割意不敢獻聞深念天下今為已平權之委質外震神武度其拳拳無有二計髙尚自流况未見信今推欵誠欲求見信實懷不自信之心亦宜待之以信而當讓其未自信也其所求者不可不許許之而反不必可與求之而不許勢必自絶許而不與其曲在已里語曰何以罰與以奪何以怒許不與思省所示報權疏曲折得宜神聖之慮非今目下所能有增益者與文若奉事先帝事有數者有似于此粗表二事以為今者事勢尚當有所依違願君思省若以在所慮可不須復㒵節度唯君恐不可采故不自拜表已欲日安厝即其情事長畢奈何松等隕動衷情頓泄亦難可言郗還未卜聊示友中郎相憂不去心感還懷近增傷惋每見范母于哀號使人情悲褚遂良右軍書目有鍾繇宣示帖一條山谷云鍾繇書小有數種豫獨善此小字又云鍾繇書有十二種意外巧妙世所傳者乃右軍臨本爾案袁昻評書云鍾司徒有十二種意外巧妙絶倫多竒又云鍾繇如雲鶴逰天羣鴻戲海行間茂密實亦難過耶以此言之十二種巧妙乃鍾㑹耳非繇也又案法書要録梁武論鍾繇書十有二意謂平直均密鋒力輕快補損巧稱非前所謂也王僧䖍云亡髙祖丞相導喪亂狼狽將鍾繇尚書宣示帖衣帶中過江在右軍處右軍借王敬仁修敬仁死其母以修平生所愛并以入棺真跡遂亡貞觀御府所藏乃右軍臨本開元中與大令所臨白騎遂帖在滑臺人家國朝刻之淳化帖蓋蘭亭之外此帖便足為寶在樂毅論之右也但今人不能研味之耳世復有丙舍戎路力命白騎遂黃帝張樂五帖近世汪氏有漢闕復帖云是鍾繇書皆别有平此不載范母子等語二王帖間多有米云齊梁人書非也余觀松即右軍帖所稱穆松也郗王獻之婦也中郎郗曇也字重熙嘗為北中郎乃知是王右軍書爾安得為齊梁人書宣示帖云昔與文若奉事先帝昔訛為者以在所慮古文以已一爾漢書云是時漢兵以踰勾注亦然故不復白白字下有兩㸃古白字印文皆然此帖黃初二年作是年八月孫權奉章遣于禁等還魏故曰權之委質也晉丞相張華書得書為慰僕諸惛疾已甚暫西卧歸還乃悉以將念及不其張華呈范陽張茂先終于司空非丞相也唐世已無書跡此帖僞作麁惡多俗筆與李懷琳所作七賢帖同其末一筆皆下垂也晉丞相桓溫書大事之日僕在都謂無所復見慰勞又計時事也還節住來已具言意餘所慰勞諸相聞答還將粗當爾耳僕無所復治庶意案晉史溫鎮荆州母孔氏卒上疏解職欲送葬宛陵詔不許此云大事之日僕在都無所復見慰勞是也還節往來者溫使人送旌節還臺也諸相聞答邊將粗當爾耳者謂邊將自能奏報已可以去官也無所復治庶意者謂不復有意治軍政民事也或謂溫是時在江陵不當言都殊不知古稱邦國都鄙左傳稱大都三五之一小九之一後世稱軍為邦國謂黑雲都雁子都是也陳去非釋治庶為酒席殊無義理述書賦云元豫正草厚而不倫若為翰墨由帶真淳山林之樂道非玉帛之能親信然由與猶同晉丞相王導書省示具卿辛酸之至吾甚憂勞卿此事亦不暫忘然書足下所欲致身處尚在殿中王制正自欲不得許卿當如何導亦天明往導白改朔情增傷感濕蒸自何如頗小覺損否帖有應不懸耿連哀勞滿悶不具王導山谷絶喜王茂𢎞此兩帖云傷感濕蒸字皆佳張懷瓘稱其行草兼妙疏柯逈擢寡葉危隂此蓋倣佛矣懷瓘又論王會稽羲之草書第八在世將王􅘙茂𢎞下若爾何足下壓右軍應别有合作者山谷云足下所欲致身處尚在殿中諸家多作彀中字雖摹失山谷為優十七帖中殿字與此不相逺也濕蒸劉作濕惡晉丞相王敦書敦頓首蠟節忽過嵗暮感悼傷悲今闕想自如常比若腰痛憒憒得示知意及不以悉王敦頓首頓首王大將軍書極佳不論其人乃可爾憒憒劉誤作快快絳帖平卷二

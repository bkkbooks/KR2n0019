body:
  text: 絳帖平卷一宋薑夔撰日蒼頡書二十八字述異記云頡葬北海呼為藏書臺周時得其書莫識遂藏之書府至秦李斯識八字云上天作命皇辟迭王漢叔孫通識十二字杜子美云蒼頡鳥迹既茫昧字體變化如浮雲則頡之書亡久矣周宣王時史籕變古文為大篆李斯又減籕體為小篆作蒼頡篇謂之秦篆斯所作篇首有蒼頡二字因以名篇非能傳頡書迹也頡之文字一變於籕再變於斯而絶矣此字疑是梵書前代譯經中國梵書無數皆漆書貝多葉與此同夏禹書十二字子坐行齊春尚禹時用科斗書韓退之詩云岣嶁峰尖神禹碑字青石赤形模竒科斗拳身薤葉披鸞飄鳯泊拏虎螭事嚴迹祕鬼莫窺道人獨上偶見之山海經云衡山一名岣嶁禹巡衡山夢得金簡玉字之書遂得治水之要今勝業寺猶有禹柏碑當是此時刻也南嶽總勝集云有人嘗至岣嶁峰下見蛟龍蛟龍踞石上光采絢爛意必禹書之神靈此類小篆可見其妄與蒼頡書皆一手偽作也魯司寇仲尼書十二字有吳君子之墓世傳仲尼表季札墓云嗚呼有吳延陵君子之墓案唐張從申跋云元宗嘗命殷仲容摹拓大厯中潤州刺史蕭定作季子廟重刻此碑傳至今豫按魯昭公二十七年闔閭殺吳王僚自立季子聘還復命於墓哀公十年嘗將兵救陳後不知其所終皇覽曰季子冢在毗陵縣暨陽鄉至今吏民皆祠之歐公云考仲尼歷聘不聞至吳又其字特大非古也墓闕題字唯東漢有之皆作分書若劉文饒王稚子闕之類又水經載朝歌縣牧野比干之墓今已中折不知誰所識亦當是東都耳洪氏𨽻續云西都彛器皆是篆書又按西都墓甎亦多是篆書某人之墓以此詳之季子墓題必是西漢時吳人所刻懷季子之賢故曰嗚呼蓋魯壁藏書文皆科斗商周彛器並用刀書此是筆書又雜小篆決非仲尼所為後世好事者傳會耳豫考篆文乃君字或曰季子非也漢神寶鑑銘郡字正如此以此知其為漢篆也舊碑只十字皆大尺餘此字小惟有吳君子之五字同餘更大異復多二字尤見其妄秦少遊云季子墓銘其真者猶疑非仲尼書况依倣為之者史籕書歇州裴易系衛恆公周宣王時史籕始著大篆十五篇或與古同或與古異世謂之籕書韓文公以石鼓文為籕所作不知何異夾漈鄭樵云籕與古文用刀書致字畫首尾皆鋭秦篆則漆書故字畫首尾皆刓石鼓之文其端皆刓以此知其為秦篆非籕也然樵之説亦未為盡詛楚文秦篆也而用刀書汲冢書古文也而用漆書先秦鍾鼎固有刓者矣秦漢兼用刀筆故有鋭者矣辨石鼓之非籕不在是也古文轉折圓無圭角秦漢因之豫按書有八體秦漢所常用者篆𨽻耳夫𨽻者篆之捷也先漢士大夫賤之不以書金石威靈之際始書金石矣楷者𨽻之捷也始於上谷王次仲至魏晉方盛然亦不以書金石也章草者楷之捷也始于杜伯度章帝愛之因以為名赴急之書也豫謂古文生籕籕生小篆小篆生𨽻𨽻生楷楷生草每降愈捷耳廋肩吾云𨽻書今之正書也是知𨽻與楷本一種而有波磔者為𨽻無波磔者為楷然古人總謂之𨽻後有行草因以正名之故書家不謂之真草而謂之草𨽻不謂之真書而謂之𨽻書史稱王羲之尤善𨽻書是也洪文惠兄弟以漢人所書為𨽻魏晉以後為八分此説非也杜詩云大小二篆生八分張懷瓘云八分者王次仲所造既言次仲作楷又言造八分則知曰𨽻曰分曰楷曰正其實一耳自漢以後楷既自成一家南北分裂𨽻又分為二體北方一體則魏受禪碑是也南方一體則吳天發神讖碑是也蓋魏人專法中郎方徑可愛吳人雜用篆法竒古無倫爾後北人多用魏體南人多用吳體皆有碑可證東晉之末字轉折方歷代承之故漢以後篆皆方至唐李陽氷乃以鍾鼎筆法書小篆故自成一家也今石鼓字方與詛楚同是為秦書明矣非籕也況此七字乃唐人小篆耳秦丞相李斯書田疇耕耨為政期月而致法令使父子為鄒魯米元章云不知何人書黃長睿云乃李陽氷篆明州刺史裴公紀德中碣字此摹十八字為斯書無銖黍差斯書傳至今者有太山刻及秦瓘衡斤量銘乃棄闕秦程邈書天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下正其致之天無以清將恐歇今人稱𨽻書為𨽻古非也書序所謂𨽻古者書有古文今文之别𨽻為今文古為古文漢靈帝時劉陶剛定古今二文尚書是也𨽻書始於程邈衛恆云秦既用篆奏事繁多篆字難成即令𨽻人佐書曰𨽻字漢道術盛行符籙所用皆作吳體至唐則總為一耳國初以來多作唐體自歐趙著録漢刻士大夫始重漢而貶唐唐體誠拘然漢刻亦有工拙不能皆佳也此帖雖無波磔謂之𨽻書亦何不可若以為邈書則非黃云自蒼頡至程邈皆偽又按周越法書苑丘光庭云左傳亥有二首六身如布笇之狀古文亥作布依此語則春秋時已有𨽻書矣􅐱善長水經注云臨淄人發古冢得銅棺前和隱起為𨽻字云齊太公六代孫胡公之棺唯三字是古餘同今書證知𨽻字出古非始於秦而邈推廣之耳古法帖知賢弟至舍晚寒想顧之傷歎遂爾永惟痛夀春富陽范道長體氣以小勝前日得此暑大都尋常新婦書寄物示諸也散騎二君何時還兄子皆佳能數物也此帖乃王大令筆書勢可見所稱散騎王敬豫也大令帖云阮新婦勉身得雄散騎殊常喜也詳見山字卷孤不度德量力欲俟義於天下而措術淺短遂至昌蹶然至于今日志猶不息君謂計將安出亮曰董卓已來豪杰並起跨州連郡不可勝數曹操比於袁紹則名微而衆寡故能尅紹以弱為強今日擁百萬之衆挾天子而令諸侯誠能不可與爭鋒也古蜀昭烈與諸葛亮問答其半在居字卷大令書中米云亮書固非山谷以為兼張芝索靖之美黃云此逸少書似豹奴帖豫按二帖雖章草未為精密又數經臨摹大小不等且妄增損史文殊無義理與豹奴帖皆非逸少筆法矣逸少學皇象章草當不止此既移屋近西牆微援裏地成大寬援裏起小三架如步廊政可一丈梁得使二家通出入作門閣也此屋之東故應作墻直步廊一壁太單空園中彌宜移三間屋故當不甚難重復粗盡圖如别耳足下既即意適間曠亦當忘暑耶逰矚踈數至對告卿少吾今年病垂耳始小差大小今度病惛忽移日耳每每深望逺言慰尚賖慨然玄日具問可與音介勿勿書後既即直人理略絶何緣復有周旋理長史斷闊亦不減卿惟公事時相瞻望耳吾面促遂至今不著不可解計至故應必有秀但不知好惡云何耳須得此二帖米云羊中散書後有欣白字黃亦以為中散書非也此晉帖耳所稱玄謂吳興太守張玄之或會稽內史謝玄所稱長史謂司徒左長史王濛或是大司馬長史王楨之或是司馬左長史王􅂒皆晉人也以此推之乃王微之輩書耳欣晚出非欣書也援與園同見皇象急就章諸家釋心著為惡暑忌暑皆非以上文尋之乃忘字耳張芝帖中講忘不忘上亡字亦如此下心字作三點劉次莊又釋作竟可怪釋有秀作有香亦誤謂秀才隨上計吏至也東晉諸州舉秀才一人既不講習遂坐所舉故至者多稱疾而去帖中好惡如何似為此􅢯古減字懷素云草不􅢯張亦同劉釋作憾尤非黃云王世將帖後兩表極古信能傳鍾氏筆意而右軍學之也表中云頓乏勿勿案顔氏家訓云世中書翰多稱勿勿相承如此莫原其由或有妄言此匆匆之殘缺耳説文勿者州里所建之旗蓋以趣民事故忩遽者稱勿勿僕謂顔氏以説文證此字為長而今世流俗又妄於勿字中斜益一點讀為匆匆字彌失真矣按祭義云勿勿諸其欲其饗之也注勿勿猶勉勉也慤愛之貌杜牧之詩浮生長勿勿是知勿勿出於祭義古人詩中用之不特稱於書翰何氏書投老殘年西崦已逼恆慮倏忽歸骸玄壤溘爾冥滅竟不一言以此在懷預為其備於兹路唯有憑心他餘不能有益年將八十可以意求欲望長存何可得也道大難俗情見善從善如登見惡行惡如崩必須策怠惰勤精進愛日惜力乃可獲耳吞聲飲氣不勞頓爾他便生異議速自詳答取竟勿滯留也十六日去留深情故當所爾餘散輩停嵗積故切思歸三月下旬還非賖兾敘不遙南路行乃寂絶傷心黃云何氏書若曰如何人耳或以為姓非也米云是歐率更令書按法書苑率更名詢長沙汨羅人唐正觀十五年卒年八十五此帖有年將八十之語詢書明矣詢墨迹今世尚多筆勢皆如此蔡琰書我生之初尚無為我生之後漢祚衰此兩句琰所作胡笳曲辭琰中郎之女因董卓之亂為胡所掠在胡中生二子曹公贖琰歸至洛陽見胡雛而念其子作胡笳十八拍琴家傳之祚字劉釋作祀此易曉右旁先點後乙為祀先乙後點為祚山谷云琰自書十八章極可觀不謂流落僅餘兩句亦似斯人身世即以豫觀之與皇象後一帖一手偽作耳衛夫人書在何氏帖前衛稽首和南近奉敕寫急就篇遂不得與師書耳但衛隨世所學規摹鍾繇遂歷多載年草著詩論草𨽻通解不敢上呈衛一弟子王逸少甚能學衛真書咄咄逼人筆勢洞精字體遒媚師可詣晉尚書館書耳仰憑至鑒大不可言弟子李氏衛和尚衛夫人帖唐初李懷琳贋作竇衆述書賦云嵇康絶交書七賢帖亦李所贋也黃云此帖尤踈繆按梁蕭子雲答武帝敕云臣昔不能技賞隨時所貴規摹子敬多歷年所二十六著晉史至二王列傳欲作論草𨽻法言不盡意遂不能成十許年始見敇者論書一卷商略筆狀洞激字體始變子敬全範元常逮爾以來自覺功進此偽帖皆竊取子雲啓中語欲小改之遂失其句讀又衛夫人乃李矩妻李充母名鑠字茂猗與師書自當著名不但稱夫族及姓也以數事考之其偽不疑前輩論此帖以其敇字從力館字從舍為偽未中其病蓋自二王以來訛字甚多陳為陳策為策皆二王輩自製不可據此定真偽也豫按懷琳字殊少韞藉與此不同似非懷琳自作觀其諸字皆楷而不可言三字作草必是集晉字為之法書苑云夫人是廷尉展之女弟恆之從妹中郎李充之母充善楷書妙參鍾索此聖善之教也夫人既是恆之從妹書安得不佳王子敬年五嵗神清朗悟已有書意每從諸兄造焉夫人因書大雅吟賜之後右軍亦嘗臨寫墨藪云夫人見右軍小時書語太常王策曰此兒必見用筆訣也妾見其書便有老成之智因流涕曰此子必蔽吾書名少陵云學書須學衛夫人但恨無過王右軍其傳尚矣僧懷素書右軍云吾真書過鍾而草故不減張僕以為真不如鍾草不及張所為世之所重以其能懷素書之不足以為道其言當不虛也懷素此言似訶右軍董逌云此阮藉臨廣武戰場之歎也孫過庭云伯英不真元常不草彼之二美而逸少兼之擬草則餘真比真則長草雖専工小劣而博涉多優蓋謂此也唐太宗謂鍾書體則古而不今字則長而逾制心摹手追右軍而已庾翼舊藏伯英草書十紙過江亡失見右軍書煥若神明頓還舊觀翼與太宗在前其言如此過庭懷素後出其言如彼何也張旭書足下晚後不知疾痛如何深極憂難比也上下安之必得發耶得足下十五日問為慰僕前患差張旭書此兩帖非贋亦非合作世所傳千文豪甚今祕閣有二迹其一佳絳帖平卷一

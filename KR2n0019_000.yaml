body:
  text: 絳帖平目録類二金石之屬提要臣等謹案絳帖平六卷宋姜夔撰夔字堯章鄱陽人按曹士冕法帖譜系云絳本舊帖尚書郎潘師旦以官帖私自摹刻者世稱潘駙馬帖又稱潘氏析居法帖石分而為二其後絳州公庫乃得其一於是補刻餘帖是名東庫本逐卷各分字號以日月光天德山河壯帝居太平何以報願上登封書為别今夔所論每卷字號與士冕所說相合然則夔所得者即東庫本也宋之論法帖者米芾黃長睿以下互有疏密夔欲折𠂻其論故取漢官廷尉平之義以名其書首有嘉泰癸亥自序云帖雖小技而上下千載關涉史傳為多觀是書援据精博可謂不負其言惟第五卷內論智果書梁武帝評書語云武帝藏鍾張二王書嘗使虞和陶隱居訂正按虞和宋人其上法書表在宋孝武帝之世去梁武帝甚逺斯則考論之偶疏耳據墨莊漫録其書本二十卷舊止抄本相傳未及雕刻所載字號止於山字其河字以下亡佚十四卷竟不可復得然殘圭斷璧終可寶也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8b79b2d8c480aaf0d002e334e42728ea0d94f4234882f78bb8909d5e3f2bcc28

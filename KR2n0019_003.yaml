body:
  text: 絳帖平卷三宋姜夔撰光晉太尉庾元亮書亮白奉告書箱先為媞子作輒先以奉之研今作之支髮枕今作無作摸若有可權付之亮再拜媞音氏又音啼江淮呼母為媞此當是以名小兒耳王僧䖍云庾征西少時與右軍齊名右軍後進庾猶不分在荆州與都下人書云小兒賤家雞皆學逸少書須吾下當比之觀此帖誠去右軍逺矣亮字元規誤題曰元亮晉車騎將軍庾翼書故吏從事中郎庾翼參軍事劉遐死罪白昨所啓龎遺孟莫大羽所請求述上事事須撿校咨論光駕當出請不從詣録事中郎共詳處别白謹啓翼遐死罪已向季春感慕兼傷情不自任奈何奈何溫和足下何如吾哀勞何賴愛護時不足下頃氣力孰若别時庾翼亮之弟嘗為陶侃府從事中郎晉有兩劉遐其一太寧二年以平王敦功封泉陵公其一南嶽魏夫人之息此泉陵也黃云此啓當是與侃二庾皆以能書名此不能佳第二帖贋作晉太守沈嘉長書十二月十三日嘉頓首頓首嵗有感懷深寒切想各平安㒒勞弊遣不具沈嘉頓首頓首述書賦云長茂草勢既挺而踈慕王不及右軍獨斷所如由鷙鳥擊而失中因蹭蹬於古􅀈此帖贋可知嘉字長茂題作嘉長亦非晉侍郎杜預書十一月十四日預頓首嵗忽已終别久益兼其勞道逺書問又簡間得來况知消息申省次若言靣親故數移轉想祖父自具云也祖父如足下來言大小云具絶女親親也有信數附書信以慰吾心也杜征南第一帖筆畫稍佳而措詞非古黃云或是江左人書第二親故帖大體與皇象第二帖崔子玉帖同語亦似崔帖皆僞也晉王循書七月二十四日循詹頓首秋月感思深得近示為慰餘熱比復可不僕疾患故示不平復頓勿力切不宣王循詹頓首米云王循馬攸王劭劉懷之劉穆之王􅂒張翼陸雲山濤卞壺謝發羊欣與章一手僞帖晉劉超書超死罪白如命皆令有本末保任然後受隨宜分處謹白此帖與庾翼第二帖同一手僞書按超為人忠清闕慎慎跡與元帝相類乃絶不與人交書述書賦云元帝之用筆可觀世瑜之呈規仰侣世瑜超字也此帖與元帝大别其僞可知晉散騎常侍謝璠伯書此計江東精兵不可卒得唯當善養見者而事慮曰多如比來憂懷實已萬端江東謂吳中也項羽所謂江東父老者也此帖右軍論時事帖書亦甚似但已經唐臨失其精妙處爾晉謝莊書弟昨還方承一日忽患悶當時乃爾大惡殊不易追企恆想諸治昨來已漸勝眠食復云何頓日寒重春節至居患者無不增動今何何治眼風不異耳指遣承問謝莊白呈左僕射謝憲子書全倣子敬風氣殊佳案史莊素多疾與大司馬江夏王義恭箋自陳兩脅癖疢眼患五月來便不復得夜坐此云眼風不異耳當是此時書也爾時蕭思話為左僕射愛才好士人多歸之此帖當是與蕭啓莊宋人誤題為晉晉劉瓌書瓌之頓首頓首朱陽逺感閏知有患耿耿知以自屈恨不相見力及不比望瓌之劉瓌之善八分大令既不宜書太極殿前謝安遂令瓌之以八分題之此僞帖也黃云與王􅘙二十四日帖無異題缺之字晉黃門侍郎王徽之書得信承嫂疾不減憂灼寧復可言吾便欲往恐不見汝等湖水泛漲不可渡遂復隔絶不然尋已往彼哉遣疏知吾逺懷不具徽之等告王右軍七男見十七帖凝之操之徽之渙之獻之并有書跡傳世下二子𤣥之肅之書跡不𫝊黃云集帖者不惟失諸子之序而誤以坦之參其中意謂坦之亦右軍子也殊不知坦之王述子乃太原族右軍乃郎邪族耳按史右軍嘗謂其諸子曰吾不减懷祖而位遇懸邈當是汝輩不及坦之故耶右軍家山隂湖水泛漲謂鏡湖也晉王坦之書坦之惶恐言不知已與謝郎論坦之事未其意良不了者今當詣公自陳願告之坦之惶恐言此帖中言謝郎似指謝安安為僕射時坦之為北中郎將徐兗二州刺史觀其稱公非與尚書令王彪之即㑹稽王道子也何以知下云惶恐言乃與所尊者啓耳筆差不凡工夫妙晉王渙之書渙之等白不審二嫂常患復何如馳情倫直等平安計嫂倫奴已應在道企遲適東五日動靜最差速姑如復小勝兾遂和耳猶不寧餘上下故常患反側此悉佳渙之等白渙之此帖或是大令書倫直皆王氏女子大令屢言之姑如復小勝王右軍妹適曹者所謂曹妹也餘上下皆常患姑上下三字頗難辨晉王操之書操之等近得識婢書慰意知年光數問可不不得姜順消息懸心操之頓首此帖當是好事者集大令帖中字為之操之姜順消息等字皆同但熟觀大令帖中知其為集字也祕閣續帖中操之自别有草蹟帖與此大懸足了此為僞草近字缺末復一筆故諸家釋為上晉王凝之書八月二十九日告庾氏女明便授衣感逝悲歎念增逺思得郗中書書說汝勉難安隱深慰懸心漸冷産後何似宜佳消息吾并更不佳憂之遣不次凝之等書按史郗愔嘗為中書侍郎又為臨海太守與姊夫王羲之髙士許邁並有邁世之風愔蓋凝之舅也所稱郗中書即愔也庾氏女似是凝之或徽之女子已嫁從其夫姓猶陶淵明所謂程氏妹也但不曉古人父與女書而稱名祕閣續帖有徽子與女帖末云徽之等告亦不可曉然謝安與其猶子書乃云父告何也豫意已行之女古人以客禮待之故稱名勉産也今俗間謂之分免漢書許后傳今皇后當勉身大令阮新婦勉身得雄亦如此右逸少四子黃云皆得家範而體各不同是善學逸少者顔延年對宋文帝論其諸子自謂竣得臣筆測得臣文㚟得臣義躍得臣酒書亦猶是也僕今以擬王氏諸子則逸少之書凝之得其韻操之得其體徽之得其勢渙之得其貌獻之得其源豫觀世無真跡久矣未易作許平也晉海陵恭侯王邃書寒佳不張丞婚事云何是良對足不可時令知女决也王邃白邃書亦不落流俗可喜晉征西司馬索靖書七月二十六日具書靖白雖數相問不解勞倦信至得書喜知棄云宅及計來東言展有期索靖白索靖帖字皆作古體山谷云此字筆端意長誠不可及長沙古帖中有急就章數十字劣於此帖黃云靖七月二十六日帖本七紙晉王平南􅘙每寶玩之值永嘉之亂乃四叠綴衣中以度江唐蒲州桑泉令豆盧器得之叠跡猶存今所録惟一紙耳摹傳失真無復意象豫觀信至得書喜知棄云宅及計來東者云云山也漢書秦山郡䝉隂縣有云云亭亭所謂禪云云者也棄云宅者猶杜詩所謂春宅棄汝去也計者上計吏也來東者猶詩所謂我來自東者也按史靖嘗為魯相豈有故人未仕者在云云耶此數語人多不曉喜知棄三字又訛當以理㑹劉禹錫嘉話云歐陽詢見索靖所書碑駐馬觀之良久而去行數百步復還下馬立觀疲倦即坐因宿其旁三日而後啓行欣然若有所得晉侍中劉穆之書亦知足下家弊耳倉卒無祿官推遷不得不相用事已御出寧復吾所得回復足下且當就之公還當思更律昏申師情事也劉穆之白劉穆之雖晉人實劉裕之敬翔耳穆之與朱齡石嘗于武帝坐答書目且至日中穆之得百函齡石得八十函而穆之應對無廢足見其敏此帖僞晉車騎將軍紀瞻書瞻白昨信來闕今蓋又貧家無以將意今料二斗少香所謂物微意全者也力言不多紀瞻頓首黃云觀物微意全等語不待見書知其僞豫謂瞻晉名儒必不作此帖官終驃騎非車騎也凡僞帖中不可解者皆不合草法晉太守張翼書二月三日翼頓首節過多懷得私書為慰意以何如深勞弊頓曳力還不具王僧䖍評書云王右軍自書表上晉穆帝帝令翼别寫題後答之右軍當時不别久後方悟云小人幾欲亂真此帖僞作可見晉陸雲書三月十六日雲白春節餘不適得示知足下平安為思而示知何由如何信數之及卿既清邃可之經髙言人歎之當令征南取之也陸雲帖與紀瞻帖同一手僞作晉中書令王恬書得示知足下問吾故不差殊劣劣力不具王恬書豫丞相導第二子書兩行極佳竇蒙云恬洽皆不見真跡不知官帖何從而有二人書也晉太守山濤書侍中尚書僕射奉東都尉新㳫伯臣濤言臣近啓崔諒史曜陳准可補吏部郎詔書可爾此三人皆衆論所稱諒猶質正少華可似敦教雖大化未可倉卒風尚所勸為益者多臣以為宜先用諒謹題事以聞也七賢帖中有山濤書已是李懷琳僞作此帖亦僞黃云恐是寫當時語耳亦非也濤為奉軍都尉時未為侍中後為兾州轉北中郎將鎮鄴乃入為侍郎遷尚書又見其妄且濤為侍中奉車都尉時銓選非所典掌不應擬此三人為郎以此見好事者假托山公啓事之名而為之絳帖平卷三
